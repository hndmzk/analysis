name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv python install 3.13
      - run: uv sync --python 3.13 --group dev
      - run: uv run ruff check src/ tests/ scripts/
      - run: uv run mypy

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv python install 3.13
      - run: uv sync --python 3.13 --group dev
      - name: Run unit tests
        shell: pwsh
        run: |
          uv run pytest tests/unit/ -v --tb=short *>&1 | Tee-Object -FilePath pytest-unit.log
          $status = $LASTEXITCODE
          if ($status -ne 0) {
            $tail = (Get-Content pytest-unit.log -Tail 120) -join "`n"
            $message = $tail.Replace('%', '%25').Replace("`r", '%0D').Replace("`n", '%0A')
            Write-Output "::error file=.github/workflows/ci.yml,line=28,title=unit pytest failure::$message"
            exit $status
          }

  test-ml-extra:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv python install 3.13
      - run: uv sync --python 3.13 --group dev --extra ml-extra
      - run: uv run pytest tests/unit/test_lstm_model.py tests/unit/test_transformer_model.py -v --tb=short

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv python install 3.13
      - run: uv sync --python 3.13 --group dev
      - name: Run integration tests
        shell: pwsh
        run: |
          uv run pytest tests/integration/ -v --tb=short *>&1 | Tee-Object -FilePath pytest-integration.log
          $status = $LASTEXITCODE
          if ($status -ne 0) {
            $tail = (Get-Content pytest-integration.log -Tail 120) -join "`n"
            $message = $tail.Replace('%', '%25').Replace("`r", '%0D').Replace("`n", '%0A')
            Write-Output "::error file=.github/workflows/ci.yml,line=53,title=integration pytest failure::$message"
            exit $status
          }
